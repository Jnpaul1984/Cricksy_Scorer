# Deploys the Vue/Vite frontend (frontend/) and pushes the built assets to Firebase Hosting via firebase.json at repo root.
name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate required deploy secrets
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${FIREBASE_TOKEN}" ] || { echo "::error::Missing required secret FIREBASE_TOKEN"; exit 1; }

      - name: Install dependencies
        working-directory: frontend
        env:
          CYPRESS_INSTALL_BINARY: 0
        run: |
          npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: https://api.cricksy-ai.com
          VITE_SOCKET_URL: https://api.cricksy-ai.com
        run: npm run build

      - name: Validate build artifacts
        run: |
          set -euo pipefail
          test -f frontend/dist/index.html

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting --non-interactive
